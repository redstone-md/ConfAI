# Verified by requesting https://api.deepinfra.com/v1/openai/models: the endpoint answers and speaks
# the OpenAI wire format. Models are discovered with `confai provider sync`
# rather than listed here, so this file cannot go stale.

id = "deepinfra"
name = "DeepInfra"
description = "Open-weight models, priced per token"
homepage = "https://deepinfra.com/docs"
api_key_env = "DEEPINFRA_API_KEY"

[provider]
base_url = "https://api.deepinfra.com/v1/openai"
wire_api = "chat"
