# Verified by requesting https://openrouter.ai/api/v1/models: the endpoint answers and speaks
# the OpenAI wire format. Models are discovered with `confai provider sync`
# rather than listed here, so this file cannot go stale.

id = "openrouter"
name = "OpenRouter"
description = "Routes to hundreds of models across providers, with fallbacks"
homepage = "https://openrouter.ai/docs"
api_key_env = "OPENROUTER_API_KEY"

[provider]
base_url = "https://openrouter.ai/api/v1"
wire_api = "chat"
